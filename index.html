function buildDayList(program) {
  const counters = { affirmation:0, meditation:0, journal:0, action:0 };
  const days = [];
  for (let day=1; day<=program.duration; day++) {
    const phaseIdx = program.phases.findIndex(p => day>=p.start && day<=p.end);
    const phase = program.phases[phaseIdx];
    const dip = day - phase.start;
    const type = phaseOrders[phaseIdx][dip % 4];
    const pool = program.pools[type];
    const content = pool[counters[type] % pool.length];
    counters[type]++;
    days.push({ day, phase, phaseIdx, type, content });
  }
  return days;
}

function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("signin"); // "signin" | "signup"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");

  const handleSubmit = async () => {
    setError(""); setInfo("");
    if (!email.trim() || !password.trim()) { setError("Merci de remplir tous les champs."); return; }
    setLoading(true);
    try {
      if (mode === "signup") {
        const { error: err } = await supabase.auth.signUp({ email: email.trim(), password });
        if (err) throw err;
        setInfo("Compte créé ! Vérifie ta boîte mail pour confirmer ton inscription, puis connecte-toi.");
        setMode("signin");
      } else {
        const { error: err } = await supabase.auth.signInWithPassword({ email: email.trim(), password });
        if (err) throw err;
        if (onAuthed) onAuthed();
      }
    } catch (e) {
      setError(e.message || "Une erreur est survenue. Réessaie.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={s.screen}>
      <div style={{textAlign:"center",padding:"24px 0 18px"}}>
        <CompassRose size={36} color="#9B6FD4"/>
        <h1 style={{...s.appName,fontSize:26,marginTop:10}}>Lumière</h1>
        <p style={s.greeting}>S'aimer. Grandir. Rayonner.</p>
      </div>
      <Divider/>

      <div style={{display:"flex",borderBottom:"1px solid rgba(196,164,224,0.1)",marginBottom:18}}>
        {["signin","signup"].map(m=>(
          <button key={m} onClick={()=>{setMode(m);setError("");setInfo("");}} style={{flex:1,background:"transparent",border:"none",padding:"9px 0",fontSize:11,cursor:"pointer",fontFamily:"Georgia,serif",letterSpacing:1,color:mode===m?"#C4A4E0":"rgba(196,164,224,0.35)",borderBottom:mode===m?"1px solid #9B6FD4":"1px solid transparent"}}>
            {m==="signin"?"SE CONNECTER":"CRÉER UN COMPTE"}
          </button>
        ))}
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:14}}>
        <input style={s.input} type="email" placeholder="Adresse e-mail" value={email} onChange={e=>setEmail(e.target.value)} autoComplete="email"/>
        <input style={s.input} type="password" placeholder="Mot de passe" value={password} onChange={e=>setPassword(e.target.value)} autoComplete={mode==="signup"?"new-password":"current-password"} onKeyDown={e=>{if(e.key==="Enter")handleSubmit();}}/>
      </div>

      {error && <p style={{color:"#E89B9B",fontSize:12,lineHeight:1.5,margin:"0 0 12px",fontStyle:"italic"}}>{error}</p>}
      {info && <p style={{color:"#A8C5A0",fontSize:12,lineHeight:1.5,margin:"0 0 12px",fontStyle:"italic"}}>{info}</p>}

      <button style={{...s.validateBtn,width:"100%",opacity:loading?0.6:1}} onClick={handleSubmit} disabled={loading}>
        {loading?"...":(mode==="signin"?"Se connecter":"Créer mon compte")}
      </button>

      <p style={{color:"rgba(196,164,224,0.35)",fontSize:10,textAlign:"center",margin:"16px 0 0",lineHeight:1.6,fontStyle:"italic"}}>
        {mode==="signin"
          ? "Pas encore de compte ? Crée-en un en un instant — c'est gratuit."
          : "Tes affirmations, ton journal et ta progression seront liés à ce compte."}
      </p>
    </div>
  );
}

function LumiereApp() {

  const [pardonTarget, setPardonTarget] = useState(null);
  const [pardonStep, setPardonStep] = useState(0);
  const [pardonTexts, setPardonTexts] = useState(["","",""]);
  const [pardonAffIdx, setPardonAffIdx] = useState(0);
  const [pardonDone, setPardonDone] = useState(false);
  const [isPremiumDemo, setIsPremiumDemo] = useState(false);
  const [premiumPlan, setPremiumPlan] = useState("annual");
  const [premiumSuccess, setPremiumSuccess] = useState(false);
  const [activeProgram, setActiveProgram] = useState(null);
  const [activeDay, setActiveDay] = useState(null);
  const [completedDays, setCompletedDays] = useState({});
  const [themeId, setThemeId] = useState("mystique");
  const t = themes[themeId];

  // ── Authentification & statut premium (Supabase) ──
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [authChecked, setAuthChecked] = useState(DEMO_MODE);

  useEffect(() => {
    if (DEMO_MODE) return;
    supabase.auth.getSession().then(({ data }) => { setSession(data.session); setAuthChecked(true); });
    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => setSession(sess));
    return () => listener.subscription.unsubscribe();
  }, []);

  const refreshProfile = () => {
    if (DEMO_MODE || !session?.user) return;
    supabase.from("profiles").select("is_premium,plan").eq("id", session.user.id).single()
      .then(({ data }) => setProfile(data));
  };

  useEffect(() => {
    if (DEMO_MODE) return;
    if (session?.user) refreshProfile();
    else setProfile(null);
  }, [session]);

  const handleLogout = () => { if (!DEMO_MODE) supabase.auth.signOut(); };

  const isPremium = DEMO_MODE ? isPremiumDemo : !!profile?.is_premium;

  const runBreath = () => {
    setBreathing(true); setBreathPhase("inspire");
    setTimeout(() => { setBreathPhase("expire");
      setTimeout(() => { setBreathPhase("done"); setBreathing(false); }, 6000);
    }, 4000);
  };

  const nextAff = () => setAffIdx(i=>(i+1)%affirmations.length);
  const nextPrompt = () => setPromptIdx(i=>(i+1)%prompts.length);
  const saveJournal = () => { if (journalText.trim()) { setSaved(true); setTimeout(()=>setSaved(false),2500); } };
  const resetPardon = () => { setPardonTarget(null); setPardonStep(0); setPardonTexts(["","",""]); setPardonDone(false); };
  const stripeLinks = {
    monthly: "https://buy.stripe.com/dRmfZh0wd2HRgYX4RN3Je00",
    annual: "https://buy.stripe.com/4gM5kD4Mt4PZfUT83Z3Je01",
    lifetime: "https://buy.stripe.com/28E8wPgvb96f2431FB3Je02",
  };
  const handleSubscribe = () => {
    if (DEMO_MODE) {
      setIsPremiumDemo(true); setPremiumSuccess(true); setTimeout(()=>setPremiumSuccess(false),3000);
      return;
    }
    const base = stripeLinks[premiumPlan];
    const params = new URLSearchParams();
    if (session?.user?.id) params.set("client_reference_id", session.user.id);
    if (session?.user?.email) params.set("prefilled_email", session.user.email);
    window.location.href = params.toString() ? `${base}?${params.toString()}` : base;
  };
  const goBack = (extra) => { if (extra) extra(); setScreen("home"); };
  const markDayDone = (pi,day) => { setCompletedDays(p=>({...p,[`${pi}-${day}`]:true})); setActiveDay(null); };
  const navigate = (key) => { setActiveProgram(null); setActiveDay(null); setScreen(key); setMenuOpen(false); if(key!=="premium") setEspaceViewGlobal(null); };

  return (
    <div style={{...s.root, background:t.bg}}>

      <div style={{...s.glow2, background:`radial-gradient(circle,${t.glow2} 0%,transparent 70%)`}}/>
      <div style={{...s.glow3, background:`radial-gradient(circle,${t.glow3} 0%,transparent 70%)`}}/>

          </div>
          {menuOpen && (
            <div style={{position:"absolute",top:38,right:20,background:"#1A1428",border:"1px solid rgba(196,164,224,0.18)",borderRadius:14,padding:"6px 0",zIndex:100,minWidth:180,boxShadow:"0 8px 32px rgba(0,0,0,0.6)"}}>
              {[
                { emoji:"👤", label: DEMO_MODE ? "Mon compte" : (session?.user?.email || "Mon compte"), action:()=>{ setMenuOpen(false); navigate("premium"); } },
                { emoji:"🎨", label:"Changer de thème", action:()=>{ setMenuOpen(false); setEspaceViewGlobal("themes"); navigate("premium"); } },

                <button key={label} onClick={action} style={{width:"100%",background:"none",border:"none",padding:"11px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",textAlign:"left"}}>

                  <span style={{color:"rgba(232,213,245,0.8)",fontSize:12,fontFamily:"Georgia,serif",letterSpacing:0.3}}>{label}</span>
                </button>
              ))}
              {!DEMO_MODE && session && (
                <>
                  <div style={{height:"1px",background:"rgba(196,164,224,0.08)",margin:"4px 0"}}/>
                  <button onClick={()=>{setMenuOpen(false);handleLogout();}} style={{width:"100%",background:"none",border:"none",padding:"11px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",textAlign:"left"}}>

        <div style={s.content}>

              <p style={{color:"rgba(196,164,224,0.4)",fontSize:12,fontStyle:"italic"}}>Chargement...</p>
            </div>

          {!DEMO_MODE && authChecked && !session && <AuthScreen onAuthed={()=>{}}/>}
          {(DEMO_MODE || (authChecked && session)) && (
            <>
              {screen==="home" && <HomeScreen affirmation={affirmations[affIdx]} onNextAff={nextAff} streak={streak} onNavigate={navigate} isPremium={isPremium}/>}
              {screen==="parcours" && <ParcoursScreen activeProgram={activeProgram} setActiveProgram={setActiveProgram} activeDay={activeDay} setActiveDay={setActiveDay} completedDays={completedDays} markDayDone={markDayDone} goBack={()=>goBack()} onGoPremium={()=>navigate("premium")}/>}
              {screen==="humeur" && <HumeurScreen selected={selectedMood} setSelected={setSelectedMood} goBack={()=>goBack()}/>}

  const step = pardonSteps[pardonStep];

    <div style={s.screen}>

              {key:"autre",icon:"🤝",title:"Pardonner à l'autre",desc:"Libérer une rancœur pour retrouver ma paix intérieure.",color:"#A8C5A0"},
            ].map(t=>(
              <button key={t.key} style={{background:"rgba(196,164,224,0.05)",border:`1px solid ${t.color}30`,borderRadius:16,padding:"18px 12px",cursor:"pointer",textAlign:"center",transition:"all 0.2s"}} onClick={()=>setPardonTarget(t.key)}>
                <span style={{fontSize:28,display:"block",marginBottom:8}}>{t.icon}</span>
                <p style={{color:"rgba(232,213,245,0.9)",fontSize:13,fontWeight:"bold",margin:"0 0 6px"}}>{t.title}</p>
                <p style={{color:"rgba(196,164,224,0.55)",fontSize:11,lineHeight:1.4,margin:0}}>{t.desc}</p>
              </button>
            ))}

        </div>

      {pardonTarget&&!pardonDone&&(

            {pardonSteps.map((st,i)=>(
              <div key={st.id} style={{display:"flex",alignItems:"center"}}>
                <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:"bold",color:i<=pardonStep?"#0D0A12":"rgba(196,164,224,0.4)",background:i<=pardonStep?step.color:"rgba(196,164,224,0.1)",border:`1px solid ${i<=pardonStep?step.color:"rgba(196,164,224,0.15)"}`}}>
                  {i<pardonStep?"✓":i+1}
                </div>
                {i<2&&<div style={{width:28,height:1,background:i<pardonStep?step.color:"rgba(196,164,224,0.15)"}}/>}
              </div>
            ))}
          </div>
          <div style={{...s.mysticalCard,borderColor:`${step.color}30`,marginBottom:14}}>
            <SectionLabel color={step.color}>Étape {pardonStep+1}</SectionLabel>
            <p style={{color:"rgba(232,213,245,0.95)",fontSize:16,fontStyle:"italic",margin:"0 0 8px"}}>{step.title}</p>
            <p style={{color:"rgba(196,164,224,0.7)",fontSize:13,lineHeight:1.6,margin:0}}>{step.desc}</p>
          </div>
          <textarea style={s.textarea} placeholder={step.prompt} value={pardonTexts[pardonStep]} onChange={e=>updateText(e.target.value)}/>
          <div style={{display:"flex",gap:10,marginTop:14}}>
            {pardonStep>0&&<button style={{...s.ghostBtn,padding:"12px 16px"}} onClick={()=>setPardonStep(p=>p-1)}>← Retour</button>}
            <button style={{...s.validateBtn,flex:1,opacity:pardonTexts[pardonStep].trim()?1:0.4}} onClick={()=>{if(!pardonTexts[pardonStep].trim())return;if(pardonStep<2)setPardonStep(p=>p+1);else setPardonDone(true);}}>
              {pardonStep<2?"Continuer →":"Finaliser"}
            </button>
          </div>
        </div>
      )}

      {pardonDone&&(
        <div style={{textAlign:"center",paddingTop:8}}>
          <span style={{fontSize:48,display:"block",marginBottom:12}}>🕊️</span>
          <h3 style={{color:"rgba(232,213,245,0.95)",fontSize:19,fontStyle:"italic",fontWeight:"normal",margin:"0 0 10px"}}>Tu as fait quelque chose de courageux.</h3>
          <p style={{color:"rgba(196,164,224,0.7)",fontSize:13,lineHeight:1.7,margin:"0 0 18px",fontStyle:"italic"}}>

          <div style={{...s.mysticalCard,textAlign:"left",marginBottom:18}}>
            <SectionLabel color="#D4AF7A">Pour sceller ce moment</SectionLabel>

        </div>
      )}
    </div>
  );
}

function ProgramDetailView({ activeProgram, completedDays, onSelectDay, onBack }) {
  const prog = programs[activeProgram];
  const days = buildDayList(prog);
  const doneCount = days.filter(d=>completedDays[`${activeProgram}-${d.day}`]).length;
  const pct = Math.round((doneCount/prog.duration)*100);
  return (
    <div style={s.screen}>
      <BackBtn goBack={onBack} label="← Parcours"/>
      <SectionLabel color={prog.color}>{prog.duration} jours</SectionLabel>
      <h2 style={{...s.screenTitle,margin:"0 0 8px"}}>{prog.emoji} {prog.theme}</h2>

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
        <div style={{flex:1,height:5,background:"rgba(196,164,224,0.1)",borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${prog.color},#D4AF7A)`,borderRadius:3,transition:"width 0.5s"}}/>
        </div>
        <span style={{color:prog.color,fontSize:11,fontWeight:"bold"}}>{doneCount}/{prog.duration}</span>
      </div>

      {prog.phases.map((phase,pIdx)=>(
        <div key={pIdx} style={{marginBottom:14}}>
          <SectionLabel color={prog.color}>{phase.name} · Jours {phase.start}-{phase.end}</SectionLabel>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {days.filter(d=>d.phaseIdx===pIdx).map(d=>{
              const ct = challengeTypes[d.type];
              const done = completedDays[`${activeProgram}-${d.day}`];
              return (
                <button key={d.day} style={{...s.exerciseCard,cursor:"pointer",border:`1px solid ${done?prog.color+"50":"rgba(196,164,224,0.1)"}`,background:done?`${prog.color}0D`:"rgba(196,164,224,0.04)",textAlign:"left",padding:"10px 12px"}} onClick={()=>onSelectDay(d.day)}>
                  <div style={{width:32,height:32,borderRadius:9,background:done?`${prog.color}25`:`${ct.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:"bold",color:done?prog.color:ct.color,flexShrink:0}}>{done?"✓":ct.icon}</div>
                  <div style={{flex:1}}>
                    <p style={{color:done?"rgba(196,164,224,0.55)":"rgba(232,213,245,0.9)",fontSize:12,fontWeight:"bold",margin:"0 0 2px"}}>Jour {d.day}</p>
                    <p style={{color:"rgba(196,164,224,0.4)",fontSize:10,margin:0}}>{ct.label}</p>
                  </div>
                  <span style={{color:"rgba(196,164,224,0.3)",fontSize:14}}>→</span>
                </button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );

function CriseExerciseView({ exercise, onBack }) {
  const [step, setStep] = useState(0);
  const [timeLeft, setTimeLeft] = useState(exercise.steps[0].timer);
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);

  useEffect(() => {
    if (!running) return;
    if (timeLeft <= 0) {
      if (step < exercise.steps.length - 1) {
        const next = step + 1;
        setStep(next);
        setTimeLeft(exercise.steps[next].timer);
      } else {
        setRunning(false);
        setDone(true);
      }
      return;
    }
    const t = setTimeout(() => setTimeLeft(v => v - 1), 1000);
    return () => clearTimeout(t);
  }, [running, timeLeft, step]);

  const current = exercise.steps[step];
  const progress = ((step) / exercise.steps.length) * 100 + ((1 - timeLeft / current.timer) / exercise.steps.length) * 100;

  return (
    <div style={s.screen}>
      <BackBtn goBack={onBack} label="← Exercices"/>
      <div style={{textAlign:"center",marginBottom:16}}>
        <span style={{fontSize:32}}>{exercise.emoji}</span>
        <h2 style={{...s.screenTitle,fontSize:18,margin:"6px 0 2px"}}>{exercise.title}</h2>
      </div>

      <div style={{height:3,background:"rgba(196,164,224,0.1)",borderRadius:2,overflow:"hidden",marginBottom:20}}>
        <div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${exercise.color},#C4A4E0)`,borderRadius:2,transition:"width 0.5s"}}/>
      </div>

      {!done ? (
        <>
          <div style={{...s.mysticalCard,minHeight:120,justifyContent:"center",alignItems:"center",textAlign:"center",marginBottom:16}}>
            <p style={{color:"rgba(232,213,245,0.9)",fontSize:15,lineHeight:1.7,fontStyle:"italic",margin:0}}>{current.text}</p>
          </div>

          {running && (
            <div style={{textAlign:"center",marginBottom:16}}>
              <span style={{color:exercise.color,fontSize:32,fontWeight:"bold"}}>{timeLeft}</span>
              <p style={{color:"rgba(196,164,224,0.4)",fontSize:10,margin:"2px 0 0",letterSpacing:1}}>secondes</p>
            </div>
          )}

          {!running ? (
            <button style={{...s.validateBtn,width:"100%"}} onClick={()=>setRunning(true)}>
              {step===0?"Commencer":"Continuer"}
            </button>
          ) : (
            <button style={{...s.ghostBtn,width:"100%",textAlign:"center"}} onClick={()=>setRunning(false)}>Pause</button>
          )}
        </>
      ) : (
        <div style={{textAlign:"center",paddingTop:16}}>
          <div style={{fontSize:40,marginBottom:12}}>✨</div>
          <p style={{color:"rgba(232,213,245,0.9)",fontSize:16,fontStyle:"italic",lineHeight:1.7,marginBottom:20}}>
            Tu as traversé cet exercice. C'est déjà beaucoup.
          </p>
          <button style={{...s.validateBtn,width:"100%",marginBottom:10}} onClick={()=>{setStep(0);setTimeLeft(exercise.steps[0].timer);setRunning(false);setDone(false);}}>
            Recommencer
          </button>
          <button style={{...s.ghostBtn,width:"100%",textAlign:"center"}} onClick={onBack}>← Retour aux exercices</button>
        </div>
      )}
    </div>
  );
}
