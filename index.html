);

    <path d="M20 4L22 18H20H18L20 4Z" fill={color}/>

);

);

    tr:{top:0,right:0,transform:"scaleX(-1)"},
    bl:{bottom:0,left:0,transform:"scaleY(-1)"},
    br:{bottom:0,right:0,transform:"scale(-1)"},
  }[pos];
  return (
    <svg width="32" height="32" viewBox="0 0 36 36" fill="none" style={{position:"absolute",pointerEvents:"none",...posStyle}}>
      <path d="M2 2 L16 2 L2 16 Z" fill="none" stroke="rgba(196,164,224,0.2)" strokeWidth="1"/>
      <path d="M2 2 L8 2 L2 8 Z" fill="rgba(196,164,224,0.1)"/>
      <circle cx="18" cy="2" r="1" fill="rgba(196,164,224,0.3)"/>
      <circle cx="2" cy="18" r="1" fill="rgba(196,164,224,0.3)"/>
    </svg>
  );
};

      setBreathPhase("inspire");
      await new Promise(r=>setTimeout(r,4000));
      if(cancelled)return;
      setBreathPhase("expire");
      await new Promise(r=>setTimeout(r,6000));
      if(cancelled)return;
      setBreathCount(c=>{
        const next=c+1;
        if(next>=6){setBreathing(false);setBreathPhase("done");return 0;}
        return next;
      });
    };
    run();
    return()=>{cancelled=true;};
  },[breathing,breathCount]);

        )}
        {premiumTab==="contenu"&&(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {["Permanent","Hebdo"].map(tag=>(
              <div key={tag}>
                <div style={{marginBottom:8}}>
                  <span style={{fontSize:8,borderRadius:5,padding:"3px 9px",letterSpacing:1,fontWeight:"bold",background:tag==="Permanent"?"rgba(212,175,122,0.1)":"rgba(168,197,160,0.1)",color:tag==="Permanent"?"#D4AF7A":"#A8C5A0",border:`1px solid ${tag==="Permanent"?"rgba(212,175,122,0.22)":"rgba(168,197,160,0.22)"}`}}>
                    {tag==="Permanent"?"INCLUS A VIE":"RENOUVELE CHAQUE SEMAINE"}
                  </span>
                </div>
                {premiumFeatures.filter(f=>f.tag===tag).map(f=>(
                  <div key={f.title} style={{...sc.exCard,marginBottom:7}}>
                    <StarSVG size={12} color={tag==="Permanent"?"#D4AF7A":"#A8C5A0"}/>
                    <div style={{flex:1}}>
                      <p style={{color:"rgba(232,213,245,0.88)",fontSize:11,fontWeight:"bold",margin:"0 0 2px"}}>{f.title}</p>
                      <p style={{color:"rgba(196,164,224,0.45)",fontSize:10,lineHeight:1.4,margin:0}}>{f.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
            ))}
            <button style={{...sc.validateBtn,width:"100%",display:"block",marginTop:4}} onClick={()=>setPremiumTab("offre")}>Voir les tarifs →</button>
          </div>
        )}
        {premiumTab==="programmes"&&(
          <div>
            <p style={sc.screenSub}>Un nouveau programme de 7 jours chaque semaine.</p>
            {weeklyPrograms.map((p,i)=>(
              <div key={i} style={{...sc.exCard,marginBottom:8,opacity:p.locked?0.45:1,border:`1px solid ${p.locked?"rgba(196,164,224,0.07)":p.color+"28"}`}}>
                <div style={{width:36,height:36,borderRadius:9,background:`${p.color}12`,border:`1px solid ${p.color}20`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  {p.locked?<span style={{fontSize:12}}>🔒</span>:<StarSVG size={13} color={p.color}/>}
                </div>
                <div style={{flex:1}}>
                  <p style={{color:"rgba(232,213,245,0.88)",fontSize:11,fontWeight:"bold",margin:"0 0 2px"}}>{p.theme}</p>
                  <p style={{color:"rgba(196,164,224,0.38)",fontSize:9,margin:0}}>{p.intro.substring(0,55)}...</p>
                </div>
              </div>
            ))}
            <button style={{...sc.validateBtn,width:"100%",display:"block",marginTop:4}} onClick={()=>setPremiumTab("offre")}>Tout debloquer →</button>
          </div>
        )}
      </div>
    );
  };

  const navItems=[
    {label:"Accueil",key:"home",icon:<CompassSVG size={18} color={screen==="home"?"#C4A4E0":"rgba(196,164,224,0.3)"}/>},
    {label:"Humeur",key:"humeur",icon:<EyeSVG size={18} color={screen==="humeur"?"#C4A4E0":"rgba(196,164,224,0.3)"}/>},
    {label:"Journal",key:"journal",icon:<span style={{fontSize:15,opacity:screen==="journal"?1:0.3}}>📖</span>},
    {label:"Exercices",key:"exercices",icon:<span style={{fontSize:15,opacity:screen==="exercices"?1:0.3}}>🌿</span>},
    {label:"Pardon",key:"pardon",icon:<span style={{fontSize:15,opacity:screen==="pardon"?1:0.3}}>🕊️</span>},
    {label:"Premium",key:"premium",icon:<StarSVG size={15} color={screen==="premium"?"#D4AF7A":"rgba(212,175,122,0.3)"}/>},
  ];

  return (
    <div style={{minHeight:"100vh",background:"#060410",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"Georgia,'Times New Roman',serif",position:"relative",overflow:"hidden",padding:"20px 0"}}>
      {/* Ambient glows */}
      <div style={{position:"fixed",width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,rgba(155,111,212,0.08) 0%,transparent 70%)",top:"-150px",right:"-150px",pointerEvents:"none"}}/>
      <div style={{position:"fixed",width:400,height:400,borderRadius:"50%",background:"radial-gradient(circle,rgba(196,164,224,0.05) 0%,transparent 70%)",bottom:"-100px",left:"-100px",pointerEvents:"none"}}/>

      <div style={{width:375,minHeight:780,maxHeight:860,background:"#0D0A12",borderRadius:44,border:"1px solid rgba(196,164,224,0.15)",boxShadow:"0 40px 80px rgba(0,0,0,0.8)",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
        <CornerSVG pos="tl"/><CornerSVG pos="tr"/>

        {/* Status bar */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 24px 6px"}}>
          <span style={{color:"rgba(232,213,245,0.55)",fontSize:12,fontFamily:"Georgia,serif",letterSpacing:1}}>9:41</span>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {isPremium&&<span style={{background:"rgba(212,175,122,0.1)",border:"1px solid rgba(212,175,122,0.25)",color:"#D4AF7A",fontSize:9,borderRadius:8,padding:"2px 8px",letterSpacing:0.5}}>✦ Premium</span>}
            <span style={{color:"rgba(196,164,224,0.4)",fontSize:11,letterSpacing:2}}>● ● ●</span>
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:"auto",scrollbarWidth:"none"}}>
          {screen==="home"&&renderHome()}
          {screen==="humeur"&&renderHumeur()}
          {screen==="journal"&&renderJournal()}
          {screen==="exercices"&&renderExercices()}
          {screen==="pardon"&&renderPardon()}
          {screen==="premium"&&renderPremium()}
        </div>

        {/* Bottom nav */}
        <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",padding:"8px 4px 14px",borderTop:"1px solid rgba(196,164,224,0.08)",background:"rgba(8,6,16,0.97)"}}>
          {navItems.map(item=>(
            <button key={item.key} onClick={()=>{setScreen(item.key);}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"0 2px"}}>
              {item.icon}
              <span style={{fontSize:8,letterSpacing:0.3,color:screen===item.key?"#C4A4E0":"rgba(196,164,224,0.3)"}}>{item.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── SHARED STYLES ──
const sc = {
  screen:{padding:"8px 20px 20px"},
  screenTitle:{color:"rgba(232,213,245,0.95)",fontSize:22,fontStyle:"italic",fontWeight:"normal",margin:"6px 0 4px"},
  screenSub:{color:"rgba(196,164,224,0.5)",fontSize:12,margin:"0 0 14px",fontStyle:"italic"},
  mysticalCard:{background:"rgba(155,111,212,0.05)",border:"1px solid rgba(196,164,224,0.14)",borderRadius:16,padding:"14px",marginBottom:10,position:"relative",overflow:"hidden"},
  validateBtn:{background:"linear-gradient(135deg,#9B6FD4,#C4A4E0)",border:"none",borderRadius:12,padding:"12px 24px",color:"#0D0A12",fontSize:13,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,'Times New Roman',serif",letterSpacing:0.5},
  ghostBtn:{background:"transparent",border:"1px solid rgba(196,164,224,0.2)",color:"rgba(196,164,224,0.65)",borderRadius:10,padding:"8px 14px",fontSize:11,cursor:"pointer",fontFamily:"Georgia,'Times New Roman',serif",letterSpacing:0.5},
  textarea:{width:"100%",minHeight:110,background:"rgba(155,111,212,0.05)",border:"1px solid rgba(196,164,224,0.14)",borderRadius:14,padding:13,color:"rgba(232,213,245,0.85)",fontSize:13,lineHeight:1.7,resize:"none",fontFamily:"Georgia,'Times New Roman',serif",fontStyle:"italic",outline:"none",boxSizing:"border-box"},
  exCard:{background:"rgba(196,164,224,0.04)",border:"1px solid rgba(196,164,224,0.1)",borderRadius:14,padding:"11px 13px",display:"flex",alignItems:"center",gap:11},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
